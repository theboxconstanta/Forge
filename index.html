<!doctype html>
<html lang="ro">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" href="/pwa-icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/apple-touch-icon-180x180.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#0E0E0E" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />

    <meta name="apple-mobile-web-app-title" content="Forge" />
    <meta name="format-detection" content="telephone=no" />
    <title>Forge</title>
    <style>
      /* CSS critic, inline: garanteaza ca #root are o inaltime + pozitionare
         definita chiar din primul randare, inainte ca index.css (fisier
         extern) sa apuce sa se incarce - plasa de siguranta, identica cu
         regula din index.css (fara transform - vezi index.css pt motivul
         complet: transform pe #root facea din el containing block pt orice
         position:fixed din pagina, inclusiv ecranul de login, care se putea
         trunchia daca #root avea o inaltime gresita). */
      html, body, #root { height: 100%; }
      body { position: fixed; inset: 0; margin: 0; }
      @media screen and (orientation: portrait) and (hover: none) and (pointer: coarse) {
        body { overflow: hidden; }
        #root {
          position: fixed;
          top: 0;
          left: 0;
          width: 100%;
          height: 100dvh;
          overflow: hidden;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
