<!doctype html>
<html lang="ro">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" href="/pwa-icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/apple-touch-icon-180x180.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#0E0E0E" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="apple-mobile-web-app-title" content="Forge" />
    <meta name="format-detection" content="telephone=no" />
    <title>Forge</title>
    <style>
      /* CSS critic, inline: garanteaza ca #root are o inaltime definita chiar
         din primul randare, inainte ca index.css (fisier extern) sa apuce sa
         se incarce - fara asta, la prima instalare PWA, #root se poate
         randa fara nicio inaltime (shrink la continut) pana se incarca CSS-ul
         extern, facand NavBar sa para "in mijlocul ecranului" pentru o clipa. */
      html, body, #root { height: 100%; }
      body { position: fixed; inset: 0; margin: 0; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
